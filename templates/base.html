<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Healthcare Portal{% endblock %}</title>
    <!-- Using Bootstrap for easy styling -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Healthcare App</a>
            <div>
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3">Hello, {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- This is where child templates (like welcome.html) inject their content -->
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
